[Chainloader]

; Scan this directory for mod DLLs on startup.
; Relative to the game exe, or an absolute path.
; Default: mods
ScanPath=mods

; Also scan the game exe's own directory for loose DLLs.
; Most users won't need this. Default: 0
ScanGameDir=0

; Path to a Mewtator manifest file listing additional DLLs to load.
; Mewtator sets this automatically — leave empty if not using Mewtator.
; Can be relative (to game dir) or absolute.
MewtatorManifest=

; Set to 0 to disable the chainloader entirely without removing it.
; The version.dll proxy still forwards calls, but no mods are loaded.
; Default: 1
Enabled=1

; Write a log to mod_logs/chainloader.log. Useful for debugging.
; Default: 1
Logging=1

[LoadOrder]

; Force specific mods to load first, in the order listed here.
; Use Mod1, Mod2, Mod3, etc. — they load in numbered order before
; the normal directory scan picks up everything else.
;
; Names are relative to ScanPath (e.g. "mods\my_mod.dll").
; Absolute paths also work (e.g. "C:\Games\Mods\my_mod.dll").
;
; Any DLLs in the scan directory that aren't listed here still load
; normally afterward.This just controls what goes first.
; List every mod for full control over the entire load order.
;
; Mewtator mod DLLs are loaded last, but fully obey their own load order.
;
